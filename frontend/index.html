<!DOCTYPE html>
<html>
<head>
    <title>Student Info</title>
</head>
<body>
    <h1>Student Details</h1>
    <p id="data"></p>

    <script>
    fetch("http://localhost:5000/student-details")
    .then(res => res.json())
    .then(data => {
        document.getElementById("data").innerHTML =
            "Name: " + data.name + "<br>" +
            "Roll: " + data.roll_number + "<br>" +
            "Register: " + data.register_number;
    })
    .catch(err => console.error(err));
</script>
</body>
</html>
